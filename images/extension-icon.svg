<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18" role="img" aria-label="System Resource Monitor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#50E6FF"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <!-- Slightly dimmed bar for CPU (lowest usage) -->
    <linearGradient id="barLow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.55"/>
    </linearGradient>
    <!-- Mid bar for RAM -->
    <linearGradient id="barMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.68"/>
    </linearGradient>
    <!-- Bright bar for GPU (highest usage) -->
    <linearGradient id="barHigh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1.00"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.80"/>
    </linearGradient>
  </defs>

  <!-- Azure gradient background -->
  <rect width="18" height="18" rx="2.5" ry="2.5" fill="url(#bg)"/>

  <!-- Baseline — sits 2.5px above icon bottom, well clear of the edge -->
  <rect x="2" y="13.2" width="14" height="0.7" rx="0.35"
        fill="white" fill-opacity="0.40"/>

  <!-- CPU bar — ~45% height, sits on baseline -->
  <rect x="2.8" y="8.4" width="3.2" height="4.8" rx="0.8" ry="0.8"
        fill="url(#barLow)"/>

  <!-- RAM bar — ~65% height -->
  <rect x="7.4" y="6.2" width="3.2" height="7.0" rx="0.8" ry="0.8"
        fill="url(#barMid)"/>

  <!-- GPU bar — ~82% height -->
  <rect x="12" y="4.4" width="3.2" height="8.8" rx="0.8" ry="0.8"
        fill="url(#barHigh)"/>
</svg>
